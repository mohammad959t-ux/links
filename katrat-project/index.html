<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز قطرات ملونة</title>
    <!-- استيراد خط Cairo من جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1164f9;
            --cyan-blue: #14d2f4;
            --bg-dark: #010f29;
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(17, 100, 249, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 210, 244, 0.15) 0%, transparent 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-white);
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--primary-blue), var(--cyan-blue));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 0 20px rgba(17, 100, 249, 0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            text-decoration: none;
            color: white;
            border-radius: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        .link-card i {
            margin-left: 10px;
            font-size: 20px;
        }

        /* تنسيق خاص لكل رابط */
        .facebook-link:hover {
            background: var(--primary-blue);
            box-shadow: 0 0 20px rgba(17, 100, 249, 0.6);
            transform: scale(1.03);
        }

        .instagram-link:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 0 20px rgba(204, 35, 102, 0.6);
            transform: scale(1.03);
        }

        /* لمسة جمالية سفلية */
        .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }

        /* تأثير الحركة عند التحميل */
        .link-card {
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .link-card:nth-child(1) { animation-delay: 0.3s; }
        .link-card:nth-child(2) { animation-delay: 0.5s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- أيقونة أو شعار المركز -->
        <div class="profile-img">
            <i class="fas fa-droplet"></i>
        </div>

        <h1>مركز قطرات ملونة</h1>
        <p>نصنع الإبداع بلمسات فنية متميزة</p>

        <div class="links-container">
            <!-- رابط فيسبوك -->
            <a href="https://www.facebook.com/profile.php?id=61552735210888" target="_blank" class="link-card facebook-link">
                <i class="fab fa-facebook-f"></i>
                <span>مركز قطرات ملونة على فيسبوك</span>
            </a>

            <!-- رابط انستغرام -->
            <a href="https://www.instagram.com/mohammad_ahmad.9/" target="_blank" class="link-card instagram-link">
                <i class="fab fa-instagram"></i>
                <span>حساب الأستاذ محمد على انستغرام</span>
            </a>
        </div>

        <div class="footer">
            &copy; 2024 جميع الحقوق محفوظة لـ مركز قطرات ملونة
        </div>
    </div>

</body>
</html>
